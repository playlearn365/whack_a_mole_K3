<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>打地鼠分解遊戲（大班）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#5DADE2;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

#gw{
  width:100%;max-width:560px;min-height:100dvh;
  background:#87CEEB;
  padding:10px;
  position:relative;
  overflow:hidden;
  touch-action:manipulation;
  display:flex;flex-direction:column;gap:6px;
}

/* 草地背景 */
#ground{position:absolute;left:0;right:0;bottom:0;height:28%;background:#5DBB63;z-index:0;}
#ground::before{content:'';position:absolute;top:-10px;left:0;right:0;height:20px;background:#4AA34F;border-radius:50%;}

/* 統計列 */
#stats-bar{
  position:relative;z-index:2;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(255,255,255,0.92);border-radius:10px;
  padding:6px 12px;gap:6px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.stat-label{font-size:10px;color:#888780;font-weight:500;}
.stat-val{font-size:15px;font-weight:700;color:#3C3489;}
.stat-val.red{color:#A32D2D;}
.stat-div{width:1px;height:28px;background:rgba(0,0,0,0.1);}

/* 目標數字橫幅 */
#target-bar{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:center;gap:12px;
  background:rgba(255,255,255,0.92);border-radius:14px;
  padding:8px 20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
}
.tb-label{font-size:16px;font-weight:700;color:#633806;}
.tb-num{font-size:56px;font-weight:900;color:#D85A30;line-height:1;}

/* 場景區 */
#scene{
  position:relative;z-index:2;
  display:flex;align-items:flex-end;gap:8px;
  flex:1;min-height:0;
}
#squirrel-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-bottom:4px;}
#sq-canvas{width:72px;height:90px;}

/* 九宮格 */
#grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  /* 關鍵：格子從底部對齊，但留出足夠空間讓最下排高於草地 */
  align-content:end;
  padding-bottom:30px;
}

/* ═══════════════════════════════
   洞口：橢圓形深色洞，高度固定
   地鼠：藏在洞底，.up 時滑上來
   overflow:hidden 讓洞口當裁切
   洞口高度必須大於地鼠最大高度
═══════════════════════════════ */
.hw{display:flex;justify-content:center;}

.hole{
  width:100%;
  /* 洞口高度 = 地鼠臉(22px) + 最多9個水果(約3排×26px=78px) + padding(16px) + 餘裕 = ~130px */
  height:160px;
  background:#3D2510;
  border-radius:50%;
  position:relative;
  cursor:pointer;
  /* 洞口內部淺棕，製造深度感 */
  box-shadow:inset 0 8px 0 #5A3A1A, 0 7px 0 #2a1a08;
  overflow:hidden;
  border:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  transition:box-shadow 0.12s;
}
.hole.selected{box-shadow:inset 0 8px 0 #5A3A1A, 0 7px 0 #534AB7, 0 0 0 3px #AFA9EC;}
.hole.matched{box-shadow:inset 0 8px 0 #3a6e3e, 0 7px 0 #1a5c22;}

/* 地鼠本體：固定高度，水果超出就捲動，確保冒出高度一致 */
.mole{
  position:absolute;
  bottom:-100%;
  left:50%;
  transform:translateX(-50%);
  width:86%;
  height:120px;          /* 固定高度，不隨水果數量變動 */
  background:#c8864a;
  border-radius:48% 48% 36% 36%;
  border:2px solid #a06030;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:6px 4px 6px;
  pointer-events:none;
  transition:bottom 0.3s cubic-bezier(.22,1,.36,1);
  overflow:hidden;       /* 水果太多就裁掉，不撐高 */
}
.mole.up{bottom:10px;}  /* 固定冒出高度 */

.hole.selected .mole{background:#AFA9EC;border-color:#534AB7;}
.hole.matched .mole{background:#4AA34F;border-color:#2e7a33;}
.mole.bad{background:#E24B4A !important;border-color:#a32d2d !important;}

.mole-face{font-size:20px;line-height:1;margin-bottom:2px;flex-shrink:0;}
.mole-fruits{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:1px;width:100%;
  font-size:22px;line-height:1.2;
  overflow:hidden;
}

/* 提示 & 進度 */
#select-hint{
  position:relative;z-index:2;text-align:center;
  font-size:13px;font-weight:600;color:#3C3489;
  background:rgba(255,255,255,0.88);border-radius:8px;
  padding:5px 12px;min-height:30px;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}
#strack{position:relative;z-index:2;text-align:center;font-size:14px;color:#fff;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.5);}

/* overlay */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);z-index:10;gap:14px;padding:24px;}
.overlay h2{font-size:24px;color:#fff;font-weight:700;text-align:center;}
.overlay p{font-size:14px;color:rgba(255,255,255,0.92);text-align:center;max-width:300px;line-height:1.6;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:320px;}
.result-card{background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 8px;text-align:center;}
.result-card.highlight{background:rgba(255,255,255,0.28);}
.rc-label{font-size:11px;color:rgba(255,255,255,0.7);display:block;margin-bottom:3px;}
.rc-val{font-size:22px;font-weight:700;color:#fff;}
.rc-val.warn{color:#FAC775;}
.bbtn{padding:13px 32px;font-size:16px;font-weight:600;background:#7F77DD;color:#fff;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 12px rgba(127,119,221,0.5);}
.bbtn:active{transform:scale(0.95);}

#toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,0.88);color:#fff;padding:7px 18px;border-radius:24px;font-size:14px;font-weight:600;pointer-events:none;opacity:0;transition:opacity 0.25s;z-index:20;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div id="gw">
  <div id="ground"></div>

  <div id="start-s" class="overlay">
    <h2>🐹 打地鼠配對遊戲<br><span style="font-size:18px">大班版</span></h2>
    <p>上方會顯示<strong style="color:#FAC775;">目標數字</strong>！<br>先點一個地鼠，再點另一個，<br>兩個水果數<strong style="color:#FAC775;">加起來等於目標</strong>就配對成功！<br>⚠️ 有一個是多餘的干擾，小心！<br>全部 4 組配對完就過關！</p>
    <button class="bbtn" onclick="startGame()">開始遊戲 🎮</button>
  </div>

  <div id="win-s" class="overlay" style="display:none">
    <h2 id="wtitle">🎉 過關！</h2>
    <p id="wmsg"></p>
    <div class="result-grid">
      <div class="result-card highlight"><span class="rc-label">答對關數</span><span class="rc-val" id="ws-cleared">0</span></div>
      <div class="result-card"><span class="rc-label">答錯次數</span><span class="rc-val warn" id="ws-wrong">0</span></div>
      <div class="result-card"><span class="rc-label">遊玩時間</span><span class="rc-val" id="ws-time">00:00</span></div>
    </div>
    <button class="bbtn" id="nbtn" onclick="nextLevel()">下一關 →</button>
  </div>

  <div id="stats-bar">
    <div class="stat-item"><span class="stat-label">遊玩時間</span><span class="stat-val" id="total-time">00:00</span></div>
    <div class="stat-div"></div>
    <div class="stat-item"><span class="stat-label">答錯次數</span><span class="stat-val red" id="wrong-count">0</span></div>
    <div class="stat-div"></div>
    <div class="stat-item"><span class="stat-label">目前關卡</span><span class="stat-val" id="lvn">1</span></div>
  </div>

  <div id="target-bar">
    <span class="tb-label">目標數字</span>
    <span class="tb-num" id="sign-num">7</span>
  </div>

  <div id="scene">
    <div id="squirrel-wrap">
      <canvas id="sq-canvas" width="72" height="90"></canvas>
    </div>
    <div id="grid"></div>
  </div>

  <div id="select-hint">請點選第一個地鼠</div>
  <div id="strack">已配對：<span id="hcnt">0</span> / 4</div>
  <div id="toast"></div>
</div>

<script>
const FRUITS=['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🍍'];
const HOLES=9, PAIRS=4, SPEED=4500;
let level=0, pairsFound=0, gameActive=false;
let currentTarget=7, lastTarget=0, levelFruit='🍎';
let selectedIdx=-1, hs=[];
let clearedCount=0, wrongCount=0, totalSecs=0, globalTimer=null;

function pickTarget(){let t;do{t=6+Math.floor(Math.random()*5);}while(t===lastTarget);lastTarget=t;return t;}
function pickFruit(){return FRUITS[Math.floor(Math.random()*FRUITS.length)];}
function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

function genCounts(target){
  const pairs=[];let tries=0;
  while(pairs.length<PAIRS&&tries<200){
    tries++;
    const a=1+Math.floor(Math.random()*(target-1));
    const b=target-a;
    if(!pairs.some(p=>(p[0]===a&&p[1]===b)||(p[0]===b&&p[1]===a)))pairs.push([a,b]);
  }
  const counts=[];
  pairs.forEach(p=>counts.push(p[0],p[1]));
  let decoy,dt=0;
  do{
    decoy=1+Math.floor(Math.random()*(target-1));
    const partner=target-decoy;
    if(counts.filter(c=>c===partner).length<=counts.filter(c=>c===decoy).length)break;
    dt++;
  }while(dt<50);
  counts.push(decoy);
  for(let i=counts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[counts[i],counts[j]]=[counts[j],counts[i]];}
  return counts;
}

// ── Tone.js 音效 ──
let toneReady=false, marimba, badSynth;
async function initTone(){
  if(toneReady)return;
  await Tone.start();
  marimba=new Tone.Synth({
    oscillator:{type:'triangle'},
    envelope:{attack:0.001,decay:0.4,sustain:0,release:0.1},
    volume:-4
  }).toDestination();
  badSynth=new Tone.Synth({
    oscillator:{type:'square'},
    envelope:{attack:0.001,decay:0.2,sustain:0,release:0.05},
    volume:-8
  }).toDestination();
  toneReady=true;
}
document.addEventListener('touchstart',initTone,{once:true});
document.addEventListener('mousedown',initTone,{once:true});

function beep(type){
  if(!toneReady)return;
  const now=Tone.now();
  try{
    if(type==='tap'){
      marimba.triggerAttackRelease('G4',0.12,now);
    } else if(type==='ok'){
      ['C5','E5','G5','C6'].forEach((n,i)=>marimba.triggerAttackRelease(n,0.2,now+i*0.1));
    } else if(type==='bad'){
      ['E3','C3','A2'].forEach((n,i)=>badSynth.triggerAttackRelease(n,0.15,now+i*0.13));
    } else if(type==='win'){
      ['C5','E5','G5','E5','G5','C6'].forEach((n,i)=>marimba.triggerAttackRelease(n,0.18,now+i*0.11));
    } else if(type==='fail'){
      ['G4','E4','C4'].forEach((n,i)=>badSynth.triggerAttackRelease(n,0.2,now+i*0.18));
    }
  }catch(e){}
}

function drawSquirrel(){
  const cv=document.getElementById('sq-canvas'),c=cv.getContext('2d');
  c.clearRect(0,0,72,90);c.save();
  c.beginPath();c.moveTo(36,72);c.bezierCurveTo(2,60,-9,20,20,18);c.bezierCurveTo(16,30,22,45,36,56);c.fillStyle='#c8864a';c.fill();
  c.beginPath();c.moveTo(36,72);c.bezierCurveTo(3,61,-7,21,22,19);c.bezierCurveTo(18,32,24,46,36,57);c.strokeStyle='#a06030';c.lineWidth=1;c.stroke();
  c.beginPath();c.ellipse(38,62,12,15,0,0,Math.PI*2);c.fillStyle='#c8864a';c.fill();c.strokeStyle='#a06030';c.lineWidth=1;c.stroke();
  c.beginPath();c.ellipse(38,38,12,12,0,0,Math.PI*2);c.fillStyle='#d9944f';c.fill();c.strokeStyle='#a06030';c.lineWidth=1;c.stroke();
  c.beginPath();c.ellipse(27,25,4,7,-0.3,0,Math.PI*2);c.fillStyle='#c8864a';c.fill();c.stroke();
  c.beginPath();c.ellipse(49,25,4,7,0.3,0,Math.PI*2);c.fillStyle='#c8864a';c.fill();c.stroke();
  c.beginPath();c.arc(33,36,2.4,0,Math.PI*2);c.fillStyle='#2C2C2A';c.fill();
  c.beginPath();c.arc(43,36,2.4,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(33.8,35.2,0.8,0,Math.PI*2);c.fillStyle='#fff';c.fill();
  c.beginPath();c.arc(43.8,35.2,0.8,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(38,41,1.8,0,Math.PI*2);c.fillStyle='#e07070';c.fill();
  c.restore();
}

function makeMole(count){
  const mole=document.createElement('div');
  mole.className='mole'; // 初始無 .up，藏在洞底
  const face=document.createElement('div');face.className='mole-face';face.textContent='🐹';
  const fruits=document.createElement('div');fruits.className='mole-fruits';
  for(let k=0;k<count;k++){const s=document.createElement('span');s.textContent=levelFruit;fruits.appendChild(s);}
  mole.appendChild(face);mole.appendChild(fruits);
  return mole;
}

function buildGrid(counts){
  const g=document.getElementById('grid');g.innerHTML='';hs=[];
  for(let i=0;i<HOLES;i++){
    const hw=document.createElement('div');hw.className='hw';
    const hole=document.createElement('div');hole.className='hole';
    const mole=makeMole(counts[i]);
    hole.appendChild(mole);
    hole.addEventListener('pointerdown',e=>{e.preventDefault();tap(i);});
    hw.appendChild(hole);g.appendChild(hw);
    hs.push({count:counts[i],up:false,locked:false,matched:false,timer:null,loopTimer:null,moleEl:mole,holeEl:hole});
  }
}

function popUp(i){
  if(!gameActive||hs[i].matched||hs[i].locked)return;
  hs[i].up=true;
  hs[i].moleEl.classList.add('up');
  clearTimeout(hs[i].timer);
  hs[i].timer=setTimeout(()=>retract(i), SPEED*(0.8+Math.random()*0.5));
}

function retract(i){
  if(!gameActive||hs[i].locked||hs[i].matched)return;
  hs[i].up=false;
  hs[i].moleEl.classList.remove('up','bad');
  clearTimeout(hs[i].loopTimer);
  hs[i].loopTimer=setTimeout(()=>popUp(i), 900+Math.random()*2000);
}

function scheduleRetract(i){
  clearTimeout(hs[i].timer);
  if(!hs[i].locked&&!hs[i].matched)
    hs[i].timer=setTimeout(()=>retract(i), SPEED*(0.8+Math.random()*0.5));
}

function schedulePop(i){
  clearTimeout(hs[i].loopTimer);clearTimeout(hs[i].timer);
  hs[i].loopTimer=setTimeout(()=>popUp(i), 400+Math.random()*2500);
}

function clearSelection(){
  if(selectedIdx>=0){
    hs[selectedIdx].locked=false;
    hs[selectedIdx].holeEl.classList.remove('selected');
    scheduleRetract(selectedIdx);
  }
  selectedIdx=-1;
  document.getElementById('select-hint').textContent='請點選第一個地鼠';
}

function tap(i){
  if(!gameActive||hs[i].matched||!hs[i].up)return;
  if(selectedIdx===i){clearSelection();return;}
  if(selectedIdx===-1){
    selectedIdx=i;hs[i].locked=true;clearTimeout(hs[i].timer);
    hs[i].holeEl.classList.add('selected');beep('tap');
    document.getElementById('select-hint').textContent='已選 '+hs[i].count+' 個，再點一個配對！';
  } else {
    const a=hs[selectedIdx].count,b=hs[i].count,hi1=selectedIdx,hi2=i;
    clearSelection();
    if(a+b===currentTarget){
      beep('ok');pairsFound++;
      document.getElementById('hcnt').textContent=pairsFound;
      showToast('✅ '+a+' + '+b+' = '+currentTarget+'！');
      [hi1,hi2].forEach(idx=>{
        hs[idx].matched=true;hs[idx].locked=false;hs[idx].up=true;
        clearTimeout(hs[idx].timer);clearTimeout(hs[idx].loopTimer);
        hs[idx].moleEl.classList.add('up');hs[idx].moleEl.classList.remove('bad');
        hs[idx].holeEl.classList.remove('selected');hs[idx].holeEl.classList.add('matched');
      });
      if(pairsFound>=PAIRS){setTimeout(()=>endLevel(true),500);}
    } else {
      wrongCount++;document.getElementById('wrong-count').textContent=wrongCount;beep('bad');
      showToast('❌ '+a+' + '+b+' = '+(a+b)+'，不是 '+currentTarget+'！');
      [hi1,hi2].forEach(idx=>{
        hs[idx].moleEl.classList.add('bad');
        setTimeout(()=>{hs[idx].moleEl.classList.remove('bad');if(!hs[idx].matched&&!hs[idx].locked)scheduleRetract(idx);},500);
      });
    }
  }
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1100);}
function stopAll(){hs.forEach((_,i)=>{clearTimeout(hs[i].timer);clearTimeout(hs[i].loopTimer);});clearSelection();}
function startGlobalTimer(){clearInterval(globalTimer);globalTimer=setInterval(()=>{totalSecs++;document.getElementById('total-time').textContent=fmtTime(totalSecs);},1000);}

function startGame(){
  document.getElementById('start-s').style.display='none';
  document.getElementById('win-s').style.display='none';
  level=0;lastTarget=0;clearedCount=0;wrongCount=0;totalSecs=0;
  document.getElementById('wrong-count').textContent=0;
  document.getElementById('total-time').textContent='00:00';
  launchLevel();
}

function launchLevel(){
  pairsFound=0;gameActive=true;selectedIdx=-1;
  currentTarget=pickTarget();levelFruit=pickFruit();
  const counts=genCounts(currentTarget);
  document.getElementById('lvn').textContent=level+1;
  document.getElementById('sign-num').textContent=currentTarget;
  document.getElementById('hcnt').textContent=0;
  document.getElementById('select-hint').textContent='請點選第一個地鼠';
  drawSquirrel();buildGrid(counts);
  hs.forEach((_,i)=>schedulePop(i));
  startGlobalTimer();
}

function endLevel(won){
  gameActive=false;clearInterval(globalTimer);stopAll();
  document.getElementById('win-s').style.display='flex';
  document.getElementById('ws-wrong').textContent=wrongCount;
  document.getElementById('ws-time').textContent=fmtTime(totalSecs);
  if(won){
    clearedCount++;document.getElementById('ws-cleared').textContent=clearedCount;beep('win');
    document.getElementById('wtitle').textContent='🎉 過關！';
    document.getElementById('wmsg').textContent='太棒了！第 '+(level+1)+' 關完成！';
    document.getElementById('nbtn').textContent='下一關 →';
  }else{
    document.getElementById('ws-cleared').textContent=clearedCount;beep('fail');
    document.getElementById('wtitle').textContent='再試試看！';
    document.getElementById('wmsg').textContent='配對了 '+pairsFound+' 組，再試一次吧！';
    document.getElementById('nbtn').textContent='再試一次 🔄';
  }
}

function nextLevel(){
  const isRetry=document.getElementById('nbtn').textContent.includes('再試');
  document.getElementById('win-s').style.display='none';
  if(!isRetry)level++;
  launchLevel();
}
</script>
</body>
</html>
